name: meme-screen

# GitHub throttles */5 crons on shared runners to ~hourly in practice, so each
# job loops 5-min scans for ~55 minutes — true 5-min cadence regardless of how
# late the next cron fire arrives. Concurrency below queues the next fire.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Prevent overlapping runs from stepping on the committed state file.
concurrency:
  group: meme-screen
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Screen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMGN_PROXY: ${{ secrets.GMGN_PROXY }}
          GMGN_API_KEY: ${{ secrets.GMGN_API_KEY }}
          # Thresholds via repo Variables (Settings → Variables) — fall back to code defaults.
          MIN_SCORE: ${{ vars.MIN_SCORE }}
          MAX_TOKEN_AGE_HOURS: ${{ vars.MAX_TOKEN_AGE_HOURS }}
          MIN_LIQUIDITY_USD: ${{ vars.MIN_LIQUIDITY_USD }}
          MIN_MCAP_USD: ${{ vars.MIN_MCAP_USD }}
          MAX_MCAP_USD: ${{ vars.MAX_MCAP_USD }}
          MIN_HOLDERS: ${{ vars.MIN_HOLDERS }}
          MAX_TOP10_RATE: ${{ vars.MAX_TOP10_RATE }}
          MAX_H1_GAIN_PCT: ${{ vars.MAX_H1_GAIN_PCT }}
          MAX_ALERTS_PER_SCAN: ${{ vars.MAX_ALERTS_PER_SCAN }}
          ALERT_COOLDOWN_HOURS: ${{ vars.ALERT_COOLDOWN_HOURS }}
          PAPER_HOLD_HOURS: ${{ vars.PAPER_HOLD_HOURS }}
          PAPER_TP_PCT: ${{ vars.PAPER_TP_PCT }}
          PAPER_SL_PCT: ${{ vars.PAPER_SL_PCT }}
        # 5-min passes until ~51 min elapsed, exiting cleanly before the 65-min
        # job timeout can kill a pass midway (slow passes — GMGN 429 backoffs —
        # made a fixed 11×(pass+300s sleep) overrun it). State is committed
        # after every pass so alert dedup and paper exits survive anything.
        run: |
          git config user.name "meme-screener"
          git config user.email "meme-screener@users.noreply.github.com"
          START=$(date +%s); i=0
          while :; do
            i=$((i+1))
            echo "=== scan pass $i ==="
            python main.py || true
            if ! git diff --quiet -- state.json; then
              git add state.json
              git commit -m "chore: update scan state [skip ci]"
              # If remote moved meanwhile, keep OUR state.json (-X theirs =
              # the replayed commit during rebase); never strand a mid-rebase.
              git pull --rebase -X theirs origin master || git rebase --abort || true
              git push || true
            fi
            NOW=$(date +%s)
            [ $((NOW - START)) -ge 3050 ] && break
            SLEEP=$((START + i*300 - NOW))
            [ $SLEEP -gt 0 ] && sleep $SLEEP || true
          done
